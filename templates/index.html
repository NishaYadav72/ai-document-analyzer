
<!DOCTYPE html>
<html>
<head>
<title>AI Document Analyzer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#0f2027,#1c3b57,#2c5364);
display:flex;
justify-content:center;
align-items:center;
}

/* main container */

.container{
width:500px;
background:#e9f3ff;
padding:40px;
border-radius:15px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
text-align:center;
}

/* heading */

h1{
margin-bottom:25px;
color:#333;
}

/* upload area */

.upload-area{
border:2px dashed #555;
padding:25px;
border-radius:10px;
margin-bottom:20px;
background:#d9eaff;
}

/* prompt textarea */

textarea{
width:100%;
height:100px;
padding:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
margin-bottom:20px;
resize:none;
}

/* button */

button{
width:100%;
padding:14px;
background:#333;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#000;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Document Analyzer</h1>

<form action="/analyze" method="post" enctype="multipart/form-data">

<div class="upload-area">
Upload File <br><br>
<input type="file" name="file" required>
</div>

<textarea name="prompt" placeholder="Write your AI prompt here..."></textarea>

<button type="submit">Analyze Document</button>

</form>

</div>

</body>
</html>
